<!DOCTYPE html>
<html color-mode="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
       byron-cyber-c 
    </title>
    <script>
      if (
        localStorage.getItem("color-mode") === "dark" ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches &&
          !localStorage.getItem("color-mode"))
      ) {
        document.documentElement.setAttribute("color-mode", "dark");
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/images/avatar.webp" />
    <meta
      name="description"
      content="'s portfolio website showcasing GitHub projects."
    />
    <script type="module" crossorigin src="/assets/index.b62803af.js"></script>
    <link rel="stylesheet" href="/assets/index.8e0b01b9.css">
  </head>

  <body>
    <div id="container">
      <!-- Dark Mode Toggle  -->
      <div class="color-mode-toggle">
        <button
          class="color-mode-btn light--hidden"
          aria-label="Toggle light mode"
        >
          <svg class="icon-sun">
            <use xlink:href="/svg/svg-defs.svg#sun" />
          </svg>
        </button>
        <button
          class="color-mode-btn dark--hidden"
          aria-label="Toggle dark mode"
        >
          <svg class="icon-moon">
            <use xlink:href="/svg/svg-defs.svg#moon" />
          </svg>
        </button>
      </div>
      <!-- 
        Name Block
        -->
      <div id="name-block">
         byron-cyber-c 
      </div>
      <!-- 
        Navigation Block
        -->
      <div id="nav-block">
        <span id="projects" class="nav-selected"> Projects </span>
      </div>
      <!-- 
        Profile Block
        -->
      <div id="pf-img-container">
        <img
          id="pf-img-source"
          src="/images/avatar.webp"
          alt="Profile Avatar"
        />
        <img
          id="pf-img-shadow"
          src="/images/avatar.webp"
          alt="Profile Avatar Shadow"
        />
      </div>
      <div id="pf-info-container">

        <div id="pf-info-links">
          <!-- Github, Location, Company, LinkedIn, Twitter info goes here -->
          <div id="pf-info-github">
            <svg class="pf-info-icon icon-f">
              <use xlink:href="/svg/svg-defs.svg#github" />
            </svg>
            <a target="_blank" href="https://github.com/byron-cyber-c">
              <span>byron-cyber-c</span>
            </a>
          </div>
  
          <div id="pf-info-linkedin">
            <svg class="pf-info-icon icon-f">
              <use xlink:href="/svg/svg-defs.svg#linkedin" />
            </svg>
            <a target="_blank" href="https://www.linkedin.com/in/byrn/">
              <span></span>
            </a>
          </div>
                     </div>
      </div>
      <!-- Repository Block -->
      <div id="repo-block">

        <div id="repo-grid" class="grid">
          <!-- repository cards go here -->
          <div class="grid-item">
            <div class="repo-lang">
              <span>HTML</span>
            </div>
            <div class="repo-about">
              <a href="https://github.com/byron-cyber-c/homelab">
                <span class="repo-title">
 homelab
                </span>
                <span class="repo-desc">
                      homelab projects
                </span>
              </a>
            </div>
            <div class="repo-stats">
              <svg class="icon-star">
                <use xlink:href="/svg/svg-defs.svg#star" />
              </svg>
              <span>0</span>
              <svg class="icon-fork">
                <use xlink:href="/svg/svg-defs.svg#fork" />
              </svg>
              <span>0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Built using Portfolio (https://github.com/shaansubbaiah/Portfolio) -->

</html>
